# Agent Card: QA-агент (тестировщик)
# Шаблон — адаптировать под конкретный DS-instrument
# По WEF 7-dimension model + AS.D.002-D.004

id: tester
name: "{{AGENT_NAME}}"
role_id: "{{ROLE_ID}}"
version: 0.1.0
status: active

dimensions:
  function: "Автоматическое тестирование AI-качества и red teaming промптов"
  role: specialized
  predictability: semi-deterministic
  autonomy: medium
  authority: read-external
  use_case: "Еженедельная оценка AI-качества + red teaming + drift detection"
  environment: local

trust_stack:
  legible_reasoning: "Каждая оценка содержит reasoning"
  bounded_agency: "Только читает traces/DB. Не модифицирует код"
  goal_transparency: "Оценить качество AI-ответов и обнаружить деградацию"
  contestability: "Результаты в DS-agent-workspace/tester/. Человек ревьюит утром"

core:
  method: "LLM-as-Judge + Red Team (Promptfoo)"
  principle: "DoorDash Simulation Flywheel: Production traces -> Evaluation -> Regression"
  output_format: "weekly-report.md"
  failure_modes:
    - "LLM-as-Judge может быть lenient -> строгие rubrics + score threshold"
    - "Red team пропускает новые атаки -> обновлять Promptfoo plugins"
    - "Stale rubrics -> quarterly review"

# 6 уровней тестирования (адаптировать под свой DS-instrument)
testing_levels:
  L1_smoke:
    tool: "pytest"
    scope: "Критические пути"
    frequency: "CI/CD + post-deploy"

  L2_regression:
    tool: "pytest + factories"
    scope: "SM стейты, guards, callbacks"
    frequency: "CI/CD на каждый push"

  L3_ai_quality:
    tool: "LLM-as-Judge (Claude Haiku)"
    scope: "Выборка реальных диалогов"
    frequency: "раз в неделю"
    location: "agents/tester/deepeval/"

  L4_red_team:
    tool: "Promptfoo"
    scope: "injection/jailbreak/PII probes"
    frequency: "раз в неделю"
    location: "agents/tester/promptfoo/"

  L5_observability:
    tool: "Langfuse (self-hosted)"
    scope: "Production tracing"
    frequency: "continuous"

  L6_synthetic:
    tool: "Claude (simulator) + LLM-as-Judge"
    scope: "Multi-turn synthetic conversations"
    frequency: "раз в неделю"
    location: "agents/tester/synthetic/"

runtime:
  executor: "Claude CLI headless"
  budget_per_run_usd: 5.0
  max_iterations: 1
  allowed_tools: ["Read", "Glob", "Grep", "Bash", "WebFetch"]
  forbidden_tools: ["Write", "Edit"]
