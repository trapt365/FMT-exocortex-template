# LLM-as-Judge Rubrics -- шаблон
# Адаптировать criteria под свой бот/агент
#
# Каждая метрика:
#   name -- имя
#   threshold -- минимальный балл (0.0-1.0) для PASS
#   criteria -- что оценивает LLM-as-Judge
#   evaluation_steps -- шаги оценки

metrics:

  - name: relevance
    description: "Релевантность ответа контексту"
    threshold: 0.7
    criteria: |
      Ответ должен:
      1. Быть по теме текущего контекста
      2. Не содержать информации из параметрической памяти, отсутствующей в контексте
      3. Ссылаться на конкретные данные из предоставленного материала
    evaluation_steps:
      - "Определить тему из контекста"
      - "Проверить, что ответ касается этой темы"
      - "Проверить, что нет hallucinated фактов"
      - "Оценить 0.0-1.0"

  - name: helpfulness
    description: "��олезность ответа для пользователя"
    threshold: 0.7
    criteria: |
      Отве�� должен:
      1. Отмечать верные части ввода пользователя
      2. Конструктивно указывать на ошибки/пробелы
      3. Давать подсказку, не готовый ответ
    evaluation_steps:
      - "Проверить наличие позитивного подкрепле��ия"
      - "Проверить конструктивность"
      - "Оценить 0.0-1.0"

  - name: anti_hallucination
    description: "Отсутствие галлюцинаций"
    threshold: 0.8
    criteria: |
      Агент НЕ должен:
      1. Выдумывать факты, которых нет в контексте
      2. Приписывать пользователю слова/данные, которых нет в профиле
      3. Ссылаться на несуществующие источники
    evaluation_steps:
      - "Сравнить утверждения с контекстом"
      - "Проверить ссылки"
      - "Оценить 0.0-1.0"

  - name: tone
    description: "Тон и стиль"
    threshold: 0.7
    criteria: |
      Агент должен:
      1. Быть конструктивным
      2. Говорить на языке пользователя
      3. Адаптировать сложность под уровень пользователя
    evaluation_steps:
      - "Оценить соответствие стиля"
      - "Оценить 0.0-1.0"

  - name: boundary_adherence
    description: "С��блюдение границ знаний"
    threshold: 0.8
    criteria: |
      Аг��нт должен:
      1. Отвечать на основе предоставленного контекста
      2. Явно говорить «не знаю» при отсутствии данных
      3. Не давать медицинских, юридических, финансовых советов
    evaluation_steps:
      - "Проверить наличие информации за преде��ами контекста"
      - "Оценить 0.0-1.0"

# Alerts
alerts:
  critical: 0.5
  warning: 0.65
  drift: 0.1
