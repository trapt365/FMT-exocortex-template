# Synthetic Conversation Scenarios -- шаблон
# Адаптировать persona, goal, mock_data под свой бот
#
# Структура:
#   id -- уникальный ID
#   category -- группа (onboarding, core_flow, edge_cases)
#   persona -- LLM-пользователь (name, description, style)
#   goal -- цель пользователя в диалоге
#   max_turns -- лимит ходов
#   initial_message -- первое сообщение (обычно /start)
#   mock_data.intern -- override для профиля пользователя
#   judge_criteria -- критерии оценки

scenarios:

  - id: onboarding_new_user
    category: onboarding
    criticality: critical
    persona:
      name: "Новичок"
      description: "Впервые зашёл, ничего не знает"
      language: ru
      style: short_messages
    goal: "Пройти онбординг до главного меню"
    max_turns: 8
    initial_message: "/start"
    mock_data:
      intern:
        onboarding_completed: false
    judge_criteria:
      - "Бот приветствует и объясняет что делать"
      - "Онбординг не зацикливается"

  - id: core_flow_happy_path
    category: core_flow
    criticality: critical
    persona:
      name: "Активный пользователь"
      description: "Знает бота, хочет использовать основную функцию"
      language: ru
      style: normal
    goal: "Выполнить основной сценарий от начала до конца"
    max_turns: 10
    initial_message: "/start"
    mock_data:
      intern:
        onboarding_completed: true
    judge_criteria:
      - "Бот проводит через основной flow"
      - "Нет ошибок и зацикливаний"

  - id: edge_garbage_input
    category: edge_cases
    criticality: medium
    persona:
      name: "Тролль"
      description: "Шлёт мусор, эмодзи, случайные символы"
      language: ru
      style: garbage_input
    goal: "Проверить что бот не крашится на мусорном вводе"
    max_turns: 8
    initial_message: "🤡🤡🤡"
    mock_data:
      intern:
        onboarding_completed: true
    judge_criteria:
      - "Бот отвечает корректно на мусор"
      - "Нет крашей"
