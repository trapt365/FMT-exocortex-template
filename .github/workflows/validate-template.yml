name: Validate Template

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck on all .sh files
        run: |
          # Severity = error: блокируем только реальные баги, не стиль/false-positive.
          # Пред-существующие warnings (SC2034 unused vars от export-pattern, SC1090
          # source non-constant, SC2155 declare-and-assign, etc) — информативны,
          # не блокируют. При желании ужесточить — поднять до warning.
          FAIL=0
          while IFS= read -r -d '' f; do
            if ! shellcheck -S error "$f"; then
              FAIL=1
            fi
          done < <(find . -name "*.sh" -type f -print0)
          exit $FAIL

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Нет автор-специфичного контента
      # Патерны делятся на глобальные (запрет везде) и "protocol-only" (запрет в скиллах/
      # хуках/шаблонах/скриптах, но разрешено в README/onboarding/docs/CHANGELOG как продукт).
      - name: Check for author-specific content
        run: |
          FAIL=0

          # Глобальные — автор-только имена и приватные репо. Запрещены везде.
          # Исключения: CHANGELOG.md (история промоций) + сами валидаторы (self-reference).
          for pattern in "tserentserenov" "PACK-MIM" "aist_bot_newarchitecture" \
                         "DS-Knowledge-Index-Tseren" "DS-my-strategy" \
                         "engines/tailor"; do
            count=$(grep -rn "$pattern" . --include="*.md" --include="*.sh" \
                    --include="*.py" --include="*.json" --include="*.plist" \
                    --include="*.yaml" --include="*.yml" \
                    --exclude='validate-template.yml' \
                    --exclude='validate-template.sh' 2>/dev/null \
                    | grep -v 'CHANGELOG.md' \
                    | wc -l)
            if [ "$count" -gt 0 ]; then
              echo "FAIL: Found '$pattern' in $count locations:"
              grep -rn "$pattern" . --include="*.md" --include="*.sh" \
                  --include="*.py" --include="*.json" --include="*.plist" \
                  --include="*.yaml" --include="*.yml" \
                  --exclude='validate-template.yml' \
                  --exclude='validate-template.sh' 2>/dev/null \
                  | grep -v 'CHANGELOG.md' | head -5
              FAIL=1
            fi
          done

          # Protocol-only — имена продуктовых сервисов автора. Разрешены в README/docs/onboarding/
          # (как упоминание продукта), запрещены в протоколах/скиллах/хуках/шаблонах планов/CLAUDE.md/ролях.
          PROTOCOL_PATHS=".claude/skills .claude/hooks .claude/rules memory CLAUDE.md roles"
          for pattern in "@aist_me_bot" "digital-twin" "content-pipeline" \
                         "knowledge-mcp" "gateway-mcp" "DS-agent-workspace/scheduler"; do
            # shellcheck disable=SC2086
            count=$(grep -rn "$pattern" $PROTOCOL_PATHS 2>/dev/null \
                    | grep -v 'CHANGELOG.md' \
                    | grep -v 'README.md' \
                    | wc -l)
            if [ "$count" -gt 0 ]; then
              echo "FAIL: Found '$pattern' in protocol-space ($count locations — OK в README/docs, не в скиллах/хуках/шаблонах):"
              # shellcheck disable=SC2086
              grep -rn "$pattern" $PROTOCOL_PATHS 2>/dev/null | head -5
              FAIL=1
            fi
          done

          [ "$FAIL" -eq 0 ] && echo "PASS: No author-specific content"
          exit $FAIL

      # 2. Нет захардкоженных /Users/ и /opt/homebrew путей
      # Исключения зеркалят setup/validate-template.sh (локальный валидатор):
      #   /Users/  — validate-template.{yml,sh}, setup.sh (примеры), /Users/.../ placeholder, комментарии-примеры
      #   /opt/homebrew — README, PLATFORM-COMPAT.md, validate-template.{yml,sh}, setup.sh, plist PATH
      - name: Check for hardcoded paths
        run: |
          FAIL=0
          count=$(grep -rn '/Users/' . --include="*.md" --include="*.sh" \
                  --include="*.json" --include="*.plist" \
                  --exclude='validate-template.yml' \
                  --exclude='validate-template.sh' \
                  --exclude='setup.sh' 2>/dev/null \
                  | grep -v '/Users/\.\.\./' \
                  | grep -v '# .*\(/Users/\|e\.g\.\)' \
                  | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "FAIL: Found /Users/ in $count locations:"
            grep -rn '/Users/' . --include="*.md" --include="*.sh" \
                --exclude='validate-template.yml' \
                --exclude='validate-template.sh' \
                --exclude='setup.sh' 2>/dev/null \
                | grep -v '/Users/\.\.\./' \
                | grep -v '# .*\(/Users/\|e\.g\.\)' | head -5
            FAIL=1
          fi

          count=$(grep -rn '/opt/homebrew' . --include="*.md" --include="*.sh" \
                  --include="*.json" --include="*.plist" \
                  --exclude='validate-template.yml' \
                  --exclude='validate-template.sh' \
                  --exclude='setup.sh' 2>/dev/null \
                  | grep -v 'README.md' \
                  | grep -v 'PLATFORM-COMPAT.md' \
                  | grep -v '/usr/local/bin.*:/opt/homebrew' \
                  | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "FAIL: Found /opt/homebrew in $count locations:"
            grep -rn '/opt/homebrew' . --include="*.md" --include="*.sh" \
                --exclude='validate-template.yml' \
                --exclude='validate-template.sh' \
                --exclude='setup.sh' 2>/dev/null \
                | grep -v 'README.md' | grep -v 'PLATFORM-COMPAT.md' | head -5
            FAIL=1
          fi

          [ "$FAIL" -eq 0 ] && echo "PASS: No hardcoded paths"
          exit $FAIL

      # 3. MEMORY.md — скелет
      - name: Check MEMORY.md is skeleton
        run: |
          if [ -f "memory/MEMORY.md" ]; then
            rows=$(grep -c '^|' memory/MEMORY.md 2>/dev/null || echo 0)
            if [ "$rows" -gt 15 ]; then
              echo "FAIL: MEMORY.md has $rows table rows (expected ≤15)"
              exit 1
            fi
            echo "PASS: MEMORY.md is skeleton ($rows rows)"
          else
            echo "WARN: memory/MEMORY.md not found"
          fi

      # 4. Обязательные файлы
      - name: Check required files
        run: |
          FAIL=0
          for f in CLAUDE.md ONTOLOGY.md README.md \
                   memory/MEMORY.md memory/hard-distinctions.md \
                   memory/roles.md \
                   roles/strategist/scripts/strategist.sh; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              FAIL=1
            fi
          done
          [ "$FAIL" -eq 0 ] && echo "PASS: All required files present"
          exit $FAIL

      # 5. MCP — серверы подключаются через claude.ai/settings/connectors (не локально)
      - name: Check MCP documentation
        run: |
          # MCP Gateway (iwe-knowledge at mcp.aisystant.com/mcp) is managed through claude.ai connectors
          # Validate that setup.sh contains instructions for users
          if grep -q "claude.ai/settings/connectors" setup.sh; then
            echo "PASS: setup.sh contains MCP connector instructions"
          else
            echo "FAIL: setup.sh missing MCP connector instructions"
            exit 1
          fi

      # 6. Smoke-test: хуки не падают на чистом пользовательском окружении.
      # Имитируем pristine user: DS-strategy вместо DS-my-strategy, DayPlan с минимальным шаблоном.
      - name: Smoke-test protocol hooks on clean user env
        run: |
          FAIL=0
          TMP=$(mktemp -d)
          export IWE_WORKSPACE="$TMP"
          export IWE_GOVERNANCE_REPO="DS-strategy"
          mkdir -p "$TMP/DS-strategy/current"

          # Минимальный DayPlan, удовлетворяющий SECTIONS из хука
          cat > "$TMP/DS-strategy/current/DayPlan 2026-04-22.md" <<'DAYPLAN'
          ---
          type: daily-plan
          date: 2026-04-22
          ---

          # Day Plan: 22 апреля 2026

          <details open>
          <summary><b>План на сегодня</b></summary>

          **Бюджет дня:** ~4h РП / ~3h физ / Плановый мультипликатор ~1.3x
          mandatory: WP-7 + контент
          carry-over: —
          </details>
          <details>
          <summary><b>Календарь (22 апр)</b></summary>

          | 10:00 | событие | 1h |
          </details>
          <details>
          <summary><b>IWE за ночь (светофор)</b></summary>

          | Scheduler | 🟢 | ok |
          </details>
          <details>
          <summary><b>Наработки Scout (разбор)</b></summary>

          нет находок
          </details>
          <details>
          <summary><b>Разбор заметок</b></summary>

          все обработаны
          </details>
          <details>
          <summary><b>Итоги вчера</b></summary>

          коммитов: 3
          </details>
          DAYPLAN

          # Прогон хука: имитируем PreToolUse с git commit DayPlan
          INPUT=$(jq -n --arg cmd "git add DS-strategy/current/DayPlan\\ 2026-04-22.md && git commit -m test" \
                  '{tool_name: "Bash", tool_input: {command: $cmd}}')
          RESULT=$(echo "$INPUT" | bash .claude/hooks/protocol-artifact-validate.sh)
          DECISION=$(echo "$RESULT" | jq -r '.decision // "allow"')

          if [ "$DECISION" = "block" ]; then
            echo "FAIL: hook blocked commit on clean user env:"
            echo "$RESULT" | jq -r '.reason'
            FAIL=1
          else
            echo "PASS: hook allows commit on clean DS-strategy env"
          fi

          rm -rf "$TMP"
          exit $FAIL

      # 7. Только допустимые placeholders
      - name: Check placeholders are valid
        run: |
          # Найти все {{...}} и проверить что они из допустимого списка
          ALLOWED="HOME_DIR|WORKSPACE_DIR|GITHUB_USER|CLAUDE_PATH|CLAUDE_PROJECT_SLUG|TIMEZONE_HOUR|TIMEZONE_DESC"
          INVALID=$(grep -rohP '\{\{[A-Z_]+\}\}' . --include="*.md" --include="*.sh" \
                    --include="*.json" --include="*.plist" 2>/dev/null \
                    | sort -u \
                    | grep -vP "\{\{($ALLOWED)\}\}" || true)
          if [ -n "$INVALID" ]; then
            echo "WARN: Unknown placeholders found:"
            echo "$INVALID"
            echo "(This is a warning, not a failure — new placeholders may be intentional)"
          else
            echo "PASS: All placeholders are valid"
          fi
